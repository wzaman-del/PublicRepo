name: Deploy Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Get Code
      uses: actions/checkout@v3

    - name: Configure Path
      run: cd modules/ec2

    - name: Install Terraform
      uses: hashicorp/setup-terraform@v2

    - name: Init
      run: terraform init

    - name: Plan
      run: terraform plan

    - name: Apply
      run: terraform apply
